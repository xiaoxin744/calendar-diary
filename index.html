<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <title>CalendarDiary - 日历日记</title>
    <style>
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af; 
      }
      .spiral-holes {
        background-image: radial-gradient(circle, #333 20%, transparent 25%);
        background-size: 20px 20px;
        background-position: 0 0;
        background-repeat: repeat-x;
        height: 20px;
        opacity: 0.1;
      }
      
      /* Electron Drag Regions */
      .draggable {
        -webkit-app-region: drag;
      }
      .non-draggable {
        -webkit-app-region: no-drag;
      }
      
      /* Base styles */
      body {
        background-color: #fdfbf7;
      }
    </style>
</head>
  <body class="overflow-hidden text-ink-black h-screen w-screen">
    <div id="root" class="w-full h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
