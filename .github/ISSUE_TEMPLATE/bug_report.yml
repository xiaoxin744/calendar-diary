name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，未发现相同问题
          required: true
        - label: 报告中不包含日记正文、密码或 WebDAV 凭据
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options: [Android, iOS, Windows, macOS, Linux, Web]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 例如 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: 请提供最短、稳定的复现步骤
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: 预期与实际结果
    validations:
      required: true
